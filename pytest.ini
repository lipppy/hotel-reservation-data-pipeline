[pytest]
# Where pytest looks, and what counts as a test file.
#
# tests/       - the real test suite for this project's code (api.py, etc.)
# practice/    - practice exercises; only the testing one (14_testing.py)
#                is actually meant to be collected by pytest, so it's named
#                to match *_testing.py instead of the other files' NN_topic.py
testpaths = tests practice
python_files = test_*.py *_testing.py
